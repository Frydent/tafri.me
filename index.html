<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>T&G on Tour</title>
<meta name="description" content="T&G on Tour — Reisen, Wohnwagen-Ideen, T&G Produkte. Bald mehr.">
<meta name="theme-color" content="#F7F6F2">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  body { margin: 0; background: #F7F6F2; font-family: 'Montserrat', system-ui, sans-serif; }
  a { text-decoration: none; color: #24345C; }
  a:hover { color: #9DBB72; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }
  .wrap { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 48px 24px; }
  .inner { display: flex; flex-direction: column; align-items: center; animation: fadeUp 0.7s ease both; }
  .logo { width: 340px; max-width: 82vw; display: block; mix-blend-mode: multiply; margin-bottom: -44px; }
  .claim { font-weight: 300; font-size: 15px; letter-spacing: 0.22em; text-indent: 0.22em; color: #3a3f36; text-align: center; }
  .tags { display: flex; align-items: center; gap: 16px; margin-top: 36px; flex-wrap: wrap; justify-content: center; }
  .tags span { font-weight: 300; font-size: 12px; letter-spacing: 0.1em; color: #6b7280; }
  .tags i { width: 4px; height: 4px; border-radius: 50%; background: #9DBB72; }
  .foot { font-weight: 300; font-size: 11px; letter-spacing: 0.14em; color: #9aa0a6; margin-top: 56px; text-align: center; }
</style>
</head>
<body>
<div class="wrap">
  <div class="inner">
    <img class="logo" src="assets/tg-on-tour.png" alt="T&G on Tour">
    <div class="claim">UNTERWEGS. BALD MEHR.</div>
    <div class="tags">
      <span>REISEN</span><i></i><span>WOHNWAGEN-IDEEN</span><i></i><span>T&amp;G PRODUKTE</span>
    </div>
    <div class="foot">tafri.me · ein Projekt von <a href="https://t-frydrych.de">t-frydrych.de</a></div>
  </div>
</div>
</body>
</html>
